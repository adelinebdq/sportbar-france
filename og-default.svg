<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Cercles décoratifs -->
  <circle cx="120" cy="120" r="180" fill="#1971c2" opacity="0.06"/>
  <circle cx="1100" cy="520" r="220" fill="#e63946" opacity="0.06"/>
  <circle cx="600" cy="315" r="280" fill="#ffffff" opacity="0.02"/>

  <!-- Icône logo -->
  <rect x="536" y="118" width="128" height="128" rx="28" fill="#c62828"/>
  <text x="600" y="207" text-anchor="middle" font-size="72" font-family="Arial, sans-serif">⚽</text>

  <!-- Titre principal -->
  <text x="600" y="320" text-anchor="middle"
        font-size="64" font-weight="800" fill="#ffffff"
        font-family="'Segoe UI', Arial, sans-serif" letter-spacing="-1">
    SportBar France
  </text>

  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle"
        font-size="28" fill="#9aa0a6"
        font-family="'Segoe UI', Arial, sans-serif">
    Trouvez où regarder vos matchs
  </text>

  <!-- Barre accent -->
  <rect x="480" y="410" width="240" height="5" rx="3" fill="url(#accent)"/>

  <!-- Coupe du Monde 2026 -->
  <text x="600" y="470" text-anchor="middle"
        font-size="22" fill="#4a5568"
        font-family="'Segoe UI', Arial, sans-serif" letter-spacing="2">
    🏆  COUPE DU MONDE 2026
  </text>

  <!-- URL -->
  <text x="600" y="540" text-anchor="middle"
        font-size="19" fill="#2d3748"
        font-family="'Segoe UI', Arial, sans-serif">
    adelinebdq.github.io/sportbar-france
  </text>
</svg>
