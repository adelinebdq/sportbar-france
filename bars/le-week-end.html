  <p class="intro">Le Week-end, ce nom dit tout de l'esprit de Luc-sur-Mer : une station balnéaire où l'on vient souffler, profiter de la Manche et savourer les plaisirs simples. Rue de la Mer, cet établissement fait partie des adresses retenues par l'Office de Tourisme Cœur de Nacre pour retransmettre les matchs de la Coupe du Monde 2026. Avec France-Sénégal le 16 juin, France-Irak le 22 juin et France-Norvège le 26 juin, chaque soirée match devient un vrai week-end à Luc-sur-Mer.</p>
